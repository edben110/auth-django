{% extends 'calificaciones/base.html' %}

{% block title %}Registrar Calificación{% endblock %}

{% block content %}
<h2 class="mb-4">Registrar Nueva Calificación</h2>

<form method="post">
    {% csrf_token %}
    {% for field in form %}
    <div class="mb-3">
        <label for="{{ field.id_for_label }}" class="form-label">{{ field.label }}</label>
        {{ field }}
        {% if field.errors %}
        <div class="text-danger">{{ field.errors }}</div>
        {% endif %}
    </div>
    {% endfor %}
    <button type="submit" class="btn btn-success">Guardar</button>
    <a href="{% url 'listar' %}" class="btn btn-secondary">Cancelar</a>
</form>
{% endblock %}
